version: '3.8'

services:
  wifi-fall-server:
    build: .
    container_name: wifi-fall-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - TZ=Asia/Shanghai
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
